<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mynaa's Battle Quest 💖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;user-select:none;}
:root{
  --bg:#0a0a1a;--pink1:#f07898;--pink2:#e8a0b8;--dark-pink:#a03060;
  --purple1:#5a3a8a;--cyan:#00e5ff;--yellow:#ffe234;--red:#ff3a3a;
  --white:#f0f4ff;--shadow:rgba(0,0,0,0.7);
}
body{background:var(--bg);font-family:'Press Start 2P',monospace;color:var(--white);
  min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
canvas{image-rendering:pixelated;display:block;}

/* SPRITE IMAGES */
.sprite-img{
  image-rendering:pixelated; display:block; width:128px; height:128px;
  object-fit:contain; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6)); transition:filter 0.1s;
}
.char-card-img{
  image-rendering:pixelated; width:100px; height:100px; object-fit:contain;
  display:block; margin:0 auto; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* SCREENS & TRANSITIONS */
.screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100vw;height:100vh;position:absolute;top:0;left:0;
  opacity:0;pointer-events:none;transition:opacity 0.6s ease-in-out;z-index:0;}
.screen.active{opacity:1;pointer-events:auto;z-index:10;}

/* TITLE */
#titleScreen{
  background:radial-gradient(ellipse at 50% 50%,#2a104a 0%,#0a0a1a 80%);
  cursor:pointer;position:relative;overflow:hidden;
}
.title-bg-anim{position:absolute;inset:0;background:linear-gradient(45deg,#1a0a3a,#2a0035,#0a0020,#1a0a3a);
  background-size:400% 400%;animation:gradientBG 10s ease infinite;opacity:0.6;z-index:1;}
@keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.title-stars{position:absolute;inset:0;pointer-events:none;z-index:2;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
.title-logo{text-align:center;z-index:10;position:relative;}
.title-logo h1{font-size:clamp(1rem,3.5vw,2rem);color:var(--pink1);
  text-shadow:0 0 20px var(--pink1),4px 4px 0 var(--dark-pink);
  line-height:1.7;animation:titlePulse 1.5s ease-in-out infinite;}
@keyframes titlePulse{0%,100%{text-shadow:0 0 20px var(--pink1),4px 4px 0 var(--dark-pink);transform:scale(1);}
  50%{text-shadow:0 0 40px var(--pink1),0 0 60px var(--pink2),4px 4px 0 var(--dark-pink);transform:scale(1.05);}}
.love-tag{font-size:1.1rem;color:var(--pink2);margin-top:10px;font-family:'VT323';}
.press-start{margin-top:28px;font-size:.6rem;color:var(--yellow);animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* SELECT */
#selectScreen{background:radial-gradient(ellipse at 50% 30%,#1a0530 0%,#0a0a1a 80%);}
.select-title{font-size:.7rem;color:var(--cyan);margin-bottom:20px;text-align:center;letter-spacing:2px;text-shadow:0 0 10px var(--cyan);}
.char-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;padding:0 12px;z-index:2;}
.char-card{
  background:rgba(255,255,255,.04);border:3px solid var(--purple1);border-radius:8px;
  padding:12px 10px;cursor:pointer;transition:all .2s ease;text-align:center;width:160px;
  position:relative;overflow:hidden;
}
.char-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(255,255,255,0.05));}
.char-card:hover,.char-card.selected{
  border-color:var(--pink1);background:rgba(255,110,180,.1);
  transform:translateY(-8px) scale(1.05);box-shadow:0 10px 20px rgba(255,110,180,.3);
}
.char-card:hover .char-card-img{transform:translateY(-5px) scale(1.1);}
.char-card-name{font-size:.45rem;color:var(--pink2);margin-top:8px;}
.type-badge{font-family:'Press Start 2P';font-size:.3rem;padding:3px 6px;border-radius:4px;display:inline-block;margin-top:6px;color:#fff;}
.type-cosmic{background:#9900cc;border:1px solid #ff00ff;box-shadow:0 0 5px #ff00ff;}
.type-love{background:#cc0066;border:1px solid #ff6699;box-shadow:0 0 5px #ff6699;}
.type-drift{background:#444444;border:1px solid #888888;box-shadow:0 0 5px #aaaaaa;}
.char-card-stats{font-family:'VT323';font-size:1rem;color:#8899bb;margin-top:8px;line-height:1.4;}
.select-btn{
  margin-top:25px;background:var(--pink1);color:#1a0030;border:none;border-radius:6px;
  padding:15px 30px;font-family:'Press Start 2P';font-size:.6rem;cursor:pointer;
  box-shadow:0 4px 0 var(--dark-pink),0 0 20px rgba(240,120,152,0.4);
  transition:all .1s;z-index:2;
}
.select-btn:hover{background:var(--pink2);transform:translateY(2px);box-shadow:0 2px 0 var(--dark-pink),0 0 30px rgba(240,120,152,0.6);}
.select-btn:active{transform:translateY(4px);box-shadow:none;}

/* BATTLE SCREEN (POKEMON STYLE) */
#battleScreen{padding:0;overflow:hidden;}
.battle-wrap{width:100%;height:100vh;display:flex;flex-direction:column;position:relative;}

/* Backgrounds */
.battle-bg{position:absolute;inset:0;z-index:0;transition:opacity .5s;}
.bg-city{background:linear-gradient(180deg,#060015 0%,#0d0028 25%,#180040 45%,#0d001a 65%,#060012 100%);}
.bg-study{background:linear-gradient(180deg,#050200 0%,#100800 30%,#1e1000 55%,#120a00 100%);}
.bg-galaxy{background:radial-gradient(ellipse at 50% 55%,#3a0060 0%,#1a0035 35%,#0a0020 70%,#040010 100%);}
.ground{position:absolute;bottom:0;left:0;right:0;height:45%;z-index:1;transform-origin:top;transform:perspective(500px) rotateX(40deg);}
.ground-city{background:linear-gradient(180deg,#150028 0%,#0a0018 50%,#060010 100%);border-top:3px solid #5500aa;}
.ground-city::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(100,0,200,.12) 48px,rgba(100,0,200,.12) 50px);}
.ground-study{background:linear-gradient(180deg,#201000 0%,#140a00 100%);border-top:3px solid #a06020;}
.ground-galaxy{background:radial-gradient(ellipse at 50% 0%,#280050 0%,#100020 60%,#060010 100%);border-top:3px solid #9900cc;}

/* Arena (Pokemon Layout) */
.arena{position:relative;flex:1;z-index:5;}
.sprite-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;}
/* Player Bottom Left */
#playerSprite{bottom:25%;left:15%;transform:scale(1.5);}
/* Enemy Top Right */
#enemySprite{top:20%;right:15%;transform:scale(1.5) scaleX(-1);}

.sprite-shadow{width:80px;height:12px;background:radial-gradient(ellipse,rgba(0,0,0,.6) 0%,transparent 70%);margin-top:-5px;border-radius:50%;}

/* Status Panels (Classic RPG) */
.status-panel{position:absolute;background:linear-gradient(to bottom right, #f8f8f8, #e0e0e0);border:3px solid #333;border-radius:8px;padding:8px 12px;box-shadow:4px 4px 0 rgba(0,0,0,0.5);color:#333;min-width:180px;}
.status-panel::before{content:'';position:absolute;top:2px;left:2px;right:2px;bottom:2px;border:1px solid #ccc;border-radius:4px;pointer-events:none;}
/* Enemy Top Left */
#enemyStatus{top:8%;left:5%;}
/* Player Bottom Right */
#playerStatus{bottom:35%;right:5%;}

.hud-name{font-size:.45rem;color:#111;margin-bottom:6px;font-weight:bold;text-transform:uppercase;}
.hud-level{font-size:.35rem;float:right;color:#666;}
.bar-wrap{height:10px;background:#444;border:2px solid #222;border-radius:4px;position:relative;margin-bottom:4px;overflow:hidden;}
.bar-fill{height:100%;transition:width 0.4s cubic-bezier(0.4, 0, 0.2, 1);border-radius:2px;}
.bar-hp{background:linear-gradient(90deg,#10c040,#30e060);}
.bar-hp.low{background:linear-gradient(90deg,#d02020,#f04040);}
.bar-hp.med{background:linear-gradient(90deg,#d0c020,#f0e040);}
.bar-mp{background:linear-gradient(90deg,#2060d0,#4080f0);box-shadow:0 0 8px rgba(64,128,240,0.6);}
.bar-ult{background:linear-gradient(90deg,#9900cc,#ff00aa);box-shadow:0 0 10px rgba(255,0,170,0.8);}
.bar-label{font-size:.3rem;color:#444;display:flex;justify-content:space-between;font-family:'Press Start 2P';margin-top:2px;margin-bottom:6px;}

/* Battle Log Box */
.dialogue-box{position:absolute;bottom:0;left:0;right:0;height:25%;background:linear-gradient(to bottom right, #2a2a3a, #1a1a2a);border-top:4px solid #f07898;z-index:20;display:flex;}
.log-text-area{flex:1;padding:15px 20px;font-family:'Press Start 2P';font-size:.55rem;line-height:1.6;color:#fff;text-shadow:1px 1px 0 #000;position:relative;}
.log-text-area::after{content:'▼';position:absolute;bottom:15px;right:20px;animation:bounce 1s infinite;display:none;}
.log-text-area.waiting::after{display:block;}

/* Action Menu */
.action-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;padding:10px;width:350px;background:#1a1a2a;border-left:4px solid #f07898;}
.action-btn{background:linear-gradient(to bottom, #f8f8f8, #e0e0e0);border:3px solid #333;border-radius:6px;color:#222;font-family:'Press Start 2P';font-size:.4rem;cursor:pointer;transition:all 0.1s;position:relative;overflow:hidden;box-shadow:2px 2px 0 #000;}
.action-btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:3px 3px 0 #000;background:linear-gradient(to bottom, #fff, #f0f0f0);}
.action-btn:active:not(:disabled){transform:translate(1px,1px);box-shadow:1px 1px 0 #000;}
.action-btn:disabled{opacity:0.5;cursor:not-allowed;background:#888;}
.action-btn .cost{display:block;font-family:'VT323';font-size:.8rem;color:#666;margin-top:4px;}
.btn-attack{border-color:#d02020;}
.btn-skill{border-color:#2060d0;}
.btn-switch{border-color:#10c040;}
.btn-ult{border-color:#9900cc;background:linear-gradient(to bottom, #fce8f0, #f0b0d0);}
.btn-ult:hover:not(:disabled){background:linear-gradient(to bottom, #fff, #f0c0e0);box-shadow:0 0 15px #ff00aa;}

/* Status FX */
.status-icon{position:absolute;top:-20px;font-size:1.5rem;animation:floatUp 1s infinite;}
.effect-overlay{position:absolute;inset:0;pointer-events:none;z-index:30;}

/* Animations */
.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-8px,-4px)}40%{transform:translate(8px,4px)}60%{transform:translate(-6px,2px)}80%{transform:translate(6px,-2px)}}
.enemy-shake{animation:eshake .4s ease;}
@keyframes eshake{0%,100%{transform:scaleX(-1) translate(0,0)}20%{transform:scaleX(-1) translate(-8px,-4px)}40%{transform:scaleX(-1) translate(8px,4px)}60%{transform:scaleX(-1) translate(-6px,2px)}}
.hit-flash{filter:brightness(3) sepia(1) hue-rotate(-50deg) saturate(5) !important;}
.ult-flash{animation:ultFlash .8s ease;}
@keyframes ultFlash{0%,100%{filter:none}30%{filter:brightness(4) hue-rotate(180deg) scale(1.1)}60%{filter:brightness(2) saturate(3) scale(1.05)}}
.float-dmg{position:absolute;font-family:'Press Start 2P';font-size:.8rem;font-weight:bold;pointer-events:none;z-index:300;text-shadow:2px 2px 0 #000;animation:dmgFloat 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1.5)}100%{opacity:0;transform:translateY(-80px) scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}

/* Neon / Decor / Background elements */
.neon-signs{position:absolute;top:10%;left:3%;right:3%;display:flex;justify-content:space-around;z-index:3;}
.neon-sign{font-family:'Press Start 2P';font-size:.28rem;padding:3px 7px;border:1px solid;animation:neonFlicker 4s step-end infinite;}
.ns-pink{color:#ff6eb4;border-color:#ff6eb4;text-shadow:0 0 8px #ff6eb4;box-shadow:0 0 8px rgba(255,110,180,.3);}
.ns-cyan{color:#00e5ff;border-color:#00e5ff;text-shadow:0 0 8px #00e5ff;box-shadow:0 0 8px rgba(0,229,255,.3);}
.ns-yellow{color:#ffe234;border-color:#ffe234;text-shadow:0 0 8px #ffe234;}
@keyframes neonFlicker{0%,88%,90%,92%,100%{opacity:1}89%,91%{opacity:.2}}
.rain{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:hidden;}
.raindrop{position:absolute;width:1px;background:linear-gradient(transparent,rgba(140,180,255,.35));animation:fall linear infinite;}
@keyframes fall{from{transform:translateY(-100%)}to{transform:translateY(100vh)}}
.book{position:absolute;z-index:4;font-family:'Press Start 2P';font-size:.28rem;padding:5px 9px;animation:bookFloat 3s ease-in-out infinite;}
.book-ujian{bottom:50%;left:12%;background:#6a0000;color:#fff;border-left:4px solid #ff4444;box-shadow:3px 3px 0 rgba(0,0,0,.5);}
.book-tugas{bottom:53%;left:38%;background:#002855;color:#fff;border-left:4px solid #4488ff;box-shadow:3px 3px 0 rgba(0,0,0,.5);animation-delay:-1s;}
.book-tilaron{bottom:50%;right:8%;background:#004a22;color:#fff;border-left:4px solid #44ff88;box-shadow:3px 3px 0 rgba(0,0,0,.5);animation-delay:-2s;}
@keyframes bookFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
.galaxy-heart{position:absolute;bottom:38%;left:50%;transform:translateX(-50%);font-size:clamp(2.5rem,7vw,5rem);animation:heartbeat 1.5s ease-in-out infinite;z-index:3;filter:drop-shadow(0 0 18px #cc00ff) drop-shadow(0 0 35px #ff00aa);}
@keyframes heartbeat{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.1)}}

/* Switch Menu Overlay */
#switchMenu{position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
#switchMenu.active{opacity:1;pointer-events:auto;}
.switch-title{font-size:.8rem;color:var(--yellow);margin-bottom:20px;text-shadow:2px 2px 0 #000;}
.switch-cards{display:flex;gap:15px;}
.switch-card{background:#222;border:3px solid #555;border-radius:8px;padding:10px;text-align:center;width:140px;cursor:pointer;transition:all 0.1s;}
.switch-card:hover{border-color:var(--cyan);background:#334;transform:translateY(-5px);}
.switch-card.dead{opacity:0.5;cursor:not-allowed;filter:grayscale(1);}
.switch-img{width:64px;height:64px;image-rendering:pixelated;margin:0 auto;}
.switch-hp{font-family:'VT323';font-size:1.2rem;color:#10c040;margin-top:5px;}
.switch-cancel{margin-top:30px;padding:10px 20px;background:#444;color:#fff;border:2px solid #fff;font-family:'Press Start 2P';cursor:pointer;}

/* ENDING SEQUENCE */
#endScreen{background:#0a0a1a;position:relative;overflow:hidden;}
#fireworksCanvas{position:absolute;inset:0;z-index:1;pointer-events:none;}
.letter-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:#fff8dc;border:6px solid #d2b48c;border-radius:10px;padding:30px;
  width:80%;max-width:500px;box-shadow:0 20px 50px rgba(0,0,0,0.8);
  z-index:20;transition:transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display:flex;flex-direction:column;align-items:center;}
.letter-popup.show{transform:translate(-50%,-50%) scale(1);}
#letterContent{font-family:'VT323';font-size:1.5rem;color:#3e2723;line-height:1.4;text-align:center;min-height:150px;}
.roaming-char{position:absolute;width:96px;height:96px;image-rendering:pixelated;z-index:10;transition:transform 0.1s;transform-origin:bottom center;}
.roam-heart{position:absolute;font-size:1.5rem;color:#ff3a3a;animation:floatFade 1.5s forwards;z-index:11;}
@keyframes floatFade{0%{opacity:1;transform:translateY(0) scale(0.5)}100%{opacity:0;transform:translateY(-50px) scale(1.5)}}
@keyframes walkBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* MOBILE RESPONSIVE */
@media(max-width:600px){
  .action-grid{width:100%;grid-template-columns:1fr 1fr;gap:4px;padding:5px;}
  .action-btn{font-size:.3rem;padding:8px 4px;}
  .action-btn .cost{font-size:.65rem;}
  .log-text-area{font-size:.4rem;padding:10px;}
  #playerSprite{transform:scale(1.2);bottom:30%;}
  #enemySprite{transform:scale(1.2) scaleX(-1);top:10%;}
  .status-panel{min-width:140px;padding:5px 8px;}
  .hud-name{font-size:.35rem;}
  .bar-label{font-size:.25rem;}
  .switch-cards{flex-direction:column;}
  .switch-card{width:200px;display:flex;align-items:center;padding:5px;}
  .switch-img{width:48px;height:48px;}
}
</style>
</head>
<body>

<div id="titleScreen" class="screen active">
  <div class="title-bg-anim"></div>
  <div class="title-stars" id="titleStars"></div>
  <div class="title-logo">
    <img id="titleCatImg" src="assets/nyom_ult.png" alt="Nyom Cat"
         style="width:140px;height:140px;image-rendering:pixelated;object-fit:contain;margin:0 auto 20px;display:block;filter:drop-shadow(0 0 20px #f07898);animation:titlePulse 1.5s ease-in-out infinite;"/>
    <h1>MYNAA'S<br>BATTLE QUEST</h1>
    <div class="love-tag">💌 hey there cantikk, i lovee youu 💌</div>
    <div class="press-start">▶ PRESS ANYWHERE TO START</div>
  </div>
</div>

<div id="selectScreen" class="screen">
  <div class="select-title">✦ CHOOSE YOUR LEAD FIGHTER ✦</div>
  <div class="char-cards" id="charCards"></div>
  <button class="select-btn" onclick="startBattle()">⚔ BATTLE START ⚔</button>
</div>

<div id="battleScreen" class="screen">
  <div class="battle-wrap" id="battleWrap">
    <div class="battle-bg bg-city" id="battleBg">
      <div class="rain" id="rainLayer"></div>
      <div class="neon-signs" id="neonSigns">
        <div class="neon-sign ns-pink">TOKO<br>BITUNG</div>
        <div class="neon-sign ns-cyan">WARUNG<br>KOPI</div>
        <div class="neon-sign ns-yellow">TAPITUR<br>AN</div>
      </div>
      <div class="buildings" id="buildingsLayer" style="position:absolute;bottom:45%;left:0;right:0;display:flex;align-items:flex-end;gap:1px;"></div>
      <div id="studyLayer" style="display:none">
        <div class="book book-ujian">Ujian!</div>
        <div class="book book-tugas">Tugas</div>
        <div class="book book-tilaron">Tilaron</div>
      </div>
      <div id="galaxyLayer" style="display:none">
        <div class="galaxy-heart">💜</div>
        <canvas id="galaxyCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;"></canvas>
      </div>
    </div>
    <div class="ground ground-city" id="battleGround"></div>

    <div class="arena" id="arena">
      <div class="effect-overlay" id="effectLayer"></div>

      <div class="sprite-wrap" id="enemySprite">
        <canvas id="enemyCanvas" width="128" height="128" style="image-rendering:pixelated;display:block;"></canvas>
        <div class="sprite-shadow"></div>
        <div class="status-icon" id="enemyStatusIcon"></div>
      </div>
      <div class="status-panel" id="enemyStatus">
        <div class="hud-name"><span id="enemyName">ENEMY</span> <span class="hud-level" id="enemyLevel">Lv?</span></div>
        <div class="bar-wrap"><div class="bar-fill bar-hp" id="enemyHpBar" style="width:100%"></div></div>
        <div style="font-family:'VT323';font-size:0.8rem;text-align:right;"><span id="enemyHpNum">100/100</span> HP</div>
      </div>

      <div class="sprite-wrap" id="playerSprite">
        <img id="playerImg" class="sprite-img" src="" alt="player"/>
        <div class="sprite-shadow"></div>
        <div class="status-icon" id="playerStatusIcon"></div>
      </div>
      <div class="status-panel" id="playerStatus">
        <div class="hud-name"><span id="playerName">PLAYER</span> <span class="hud-level" id="playerLevel">Lv1</span></div>
        <div class="bar-wrap"><div class="bar-fill bar-hp" id="playerHpBar" style="width:100%"></div></div>
        <div class="bar-label"><span id="playerHpNum">100/100</span><span>HP</span></div>
        <div class="bar-wrap" style="height:6px;border-color:#111;"><div class="bar-fill bar-mp" id="playerMpBar" style="width:100%"></div></div>
        <div class="bar-wrap" style="height:4px;border-color:#111;margin-bottom:0;"><div class="bar-fill bar-ult" id="playerUltBar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="dialogue-box">
      <div class="log-text-area" id="logTextArea" onclick="advanceDialogue()"></div>
      <div class="action-grid" id="actionPanel">
        <button class="action-btn btn-attack" id="btn-attack" onclick="doAction('attack')">
          ⚔️ ATTACK <span class="cost">BASIC DMG</span>
        </button>
        <button class="action-btn btn-skill" id="btn-skill" onclick="doAction('skill')">
          <span id="skillIcon">✨</span> <span id="skillName">SKILL</span> <span class="cost" id="skillCost">30 MP</span>
        </button>
        <button class="action-btn btn-switch" id="btn-switch" onclick="openSwitchMenu()">
          🔄 SWITCH <span class="cost">PARTY</span>
        </button>
        <button class="action-btn btn-ult" id="btn-ult" onclick="doAction('ultimate')">
          <span id="ultIcon">💥</span> ULTIMATE <span class="cost" style="color:#aa0066">100% ULT</span>
        </button>
      </div>

// ══════════════════════════════════════════════
//  TYPEWRITER BATTLE LOG
// ══════════════════════════════════════════════
let logQueue = [];
let isTyping = false;
let typeInterval = null;

function addLog(msg, color, delay=800, callback=null) {
  logQueue.push({msg, color, delay, callback});
  if(!isTyping) typeNextLog();
}

function typeNextLog() {
  if(logQueue.length === 0) return;
  isTyping = true;
  const log = logQueue.shift();
  const el = document.getElementById('logTextArea');
  el.classList.remove('waiting');
  el.style.color = log.color || '#fff';
  el.textContent = '';
  let i = 0;
  
  if(typeInterval) clearInterval(typeInterval);
  typeInterval = setInterval(() => {
    el.textContent += log.msg.charAt(i);
    i++;
    if(i >= log.msg.length) {
      clearInterval(typeInterval);
      el.classList.add('waiting');
      setTimeout(() => {
        isTyping = false;
        if(log.callback) log.callback();
        else typeNextLog();
      }, log.delay);
    }
  }, 30);
}

function advanceDialogue() {
  if(isTyping && typeInterval) {
    // Skip to end
    clearInterval(typeInterval);
    const log = logQueue[0] ? logQueue[0] : null; // we shifted it, so it's active.
    // Hacky way to skip - let it run out quickly
  }
}

function clearLog() { document.getElementById('logTextArea').textContent = ''; document.getElementById('logTextArea').classList.remove('waiting'); }

// ══════════════════════════════════════════════
//  BATTLE SYSTEM
// ══════════════════════════════════════════════
function startBattle(){ 
  // Initialize Party
  G.party = JSON.parse(JSON.stringify(CHARS_DATA)); // Deep copy
  G.currentLevel = 0; 
  initBattle(); 
}

function initBattle(){
  const lv = LEVELS[G.currentLevel];
  G.activeChar = G.party[G.selectedChar];
  G.wave = 1; G.busy = false; G.bossPhase2 = false;
  initWave();

  // Env
  document.getElementById('battleBg').className = 'battle-bg bg-'+lv.bg;
  document.getElementById('battleGround').className = 'ground ground-'+lv.ground;
  document.getElementById('rainLayer').innerHTML='';
  document.getElementById('neonSigns').style.display='none';
  document.getElementById('buildingsLayer').innerHTML='';
  document.getElementById('studyLayer').style.display='none';
  document.getElementById('galaxyLayer').style.display='none';

  if(lv.bg==='city'){ document.getElementById('neonSigns').style.display='flex'; buildCity(); makeRain(); }
  else if(lv.bg==='study'){ document.getElementById('studyLayer').style.display='block'; }
  else { document.getElementById('galaxyLayer').style.display='block'; drawGalaxy(); }

  setPlayerSprite('idle');
  setEnemySprite(lv.enemyFn);
  updateHUD();

  switchScreen('battleScreen');
  logQueue = []; isTyping = false; clearLog();
  
  addLog(`Encountered ${lv.enemyName}!`, '#fff', 1000, () => {
    addLog(`Go! ${G.activeChar.name}!`, '#ffeb3b', 800, () => {
      setPlayerTurn();
    });
  });
}

function initWave(){
  const lv = LEVELS[G.currentLevel];
  const m = 1 + (G.wave - 1) * 0.3;
  G.enemyMaxHp = Math.floor(lv.enemyHp * m);
  G.enemyHp = G.enemyMaxHp;
  document.getElementById('enemyLevel').textContent = 'Lv' + (G.currentLevel*3 + G.wave);
  document.getElementById('enemyName').textContent = G.wave > 1 ? lv.enemyName+'★' : lv.enemyName;
  setEnemySprite(lv.enemyFn);
  updateHUD();
}

function updateHUD(){
  const ch = G.activeChar;
  document.getElementById('playerName').textContent = ch.name;
  
  const hpPct = (ch.hp/ch.maxHp*100);
  const hpBar = document.getElementById('playerHpBar');
  hpBar.style.width = hpPct+'%';
  hpBar.className = 'bar-fill bar-hp ' + (hpPct < 25 ? 'low' : hpPct < 50 ? 'med' : '');
  document.getElementById('playerHpNum').textContent = ch.hp+'/'+ch.maxHp;
  
  document.getElementById('playerMpBar').style.width = (ch.mp/ch.maxMp*100)+'%';
  document.getElementById('playerUltBar').style.width = ch.ult+'%';
  
  const eHpPct = (Math.max(0,G.enemyHp)/G.enemyMaxHp*100);
  const eHpBar = document.getElementById('enemyHpBar');
  eHpBar.style.width = eHpPct+'%';
  eHpBar.className = 'bar-fill bar-hp ' + (eHpPct < 25 ? 'low' : eHpPct < 50 ? 'med' : '');
  document.getElementById('enemyHpNum').textContent = Math.max(0,G.enemyHp)+'/'+G.enemyMaxHp;

  // Buttons
  document.getElementById('skillIcon').textContent = ch.skillIcon;
  document.getElementById('skillName').textContent = ch.skill.name.split(' ')[0];
  document.getElementById('skillCost').textContent = ch.skill.mp+' MP';
  document.getElementById('ultIcon').textContent = ch.ultIcon;
  
  document.getElementById('btn-skill').disabled = ch.mp < ch.skill.mp || !G.playerTurn || G.busy;
  document.getElementById('btn-ult').disabled = ch.ult < 100 || !G.playerTurn || G.busy;
  document.getElementById('btn-attack').disabled = !G.playerTurn || G.busy;
  document.getElementById('btn-switch').disabled = !G.playerTurn || G.busy;
}

function setPlayerTurn(){ G.playerTurn=true; G.busy=false; updateHUD(); addLog(`What will ${G.activeChar.name} do?`, '#fff'); }
function setEnemyTurn(){ G.playerTurn=false; updateHUD(); setTimeout(enemyAct, 800); }

function floatDmg(elId, dmg, color, msg=''){
  const el = document.getElementById(elId);
  const r = el.getBoundingClientRect();
  const d = document.createElement('div');
  d.className = 'float-dmg'; 
  d.innerHTML = `-${dmg}<br><span style="font-size:0.5rem">${msg}</span>`; 
  d.style.color = color||'#fff';
  d.style.left = (r.left + r.width/2 - 20)+'px'; 
  d.style.top = (r.top + 20)+'px';
  document.body.appendChild(d); setTimeout(()=>d.remove(), 1200);
}

// ══════════════════════════════════════════════
//  ACTION LOGIC
// ══════════════════════════════════════════════
function doAction(type){
  if(!G.playerTurn || G.busy) return;
  G.busy = true;
  const ch = G.activeChar;
  const lv = LEVELS[G.currentLevel];
  const eEl = document.getElementById('enemySprite');
  const pEl = document.getElementById('playerSprite');

  if(type === 'attack'){
    setPlayerSprite('attack');
    pEl.classList.add('shake');
    setTimeout(()=>{ pEl.classList.remove('shake'); setPlayerSprite('idle'); }, 400);
    
    // Crit calc
    const isCrit = Math.random() < 0.1;
    let baseDmg = Math.max(1, ch.atk + Math.floor(Math.random()*8) - lv.enemyDef);
    if(isCrit) baseDmg = Math.floor(baseDmg * 1.5);
    
    // Type advantage
    const mult = getTypeMultiplier(ch.type, lv.type);
    let finalDmg = Math.floor(baseDmg * mult);
    
    addLog(`${ch.name} used Attack!`, '#fff', 500, () => {
      G.enemyHp -= finalDmg; eEl.classList.add('hit-flash','enemy-shake');
      setTimeout(()=>eEl.classList.remove('hit-flash','enemy-shake'), 450);
      floatDmg('enemySprite', finalDmg, isCrit?'#ffeb3b':'#fff', isCrit?'CRITICAL!':'');
      
      let nextLog = () => {
        ch.ult = Math.min(100, ch.ult + 15); updateHUD(); checkEnemyDead();
      };
      
      if(mult > 1) addLog("It's super effective!", '#ffeb3b', 800, nextLog);
      else if(mult < 1) addLog("It's not very effective...", '#aaa', 800, nextLog);
      else setTimeout(nextLog, 500);
    });

  } else if(type === 'skill'){
    if(ch.mp < ch.skill.mp){ G.busy=false; return; }
    ch.mp -= ch.skill.mp;
    setPlayerSprite('attack');
    
    const mult = getTypeMultiplier(ch.type, lv.type);
    let finalDmg = Math.floor((ch.skill.dmg + Math.floor(Math.random()*10)) * mult);

    addLog(`${ch.name} used ${ch.skill.name}!`, '#64b5f6', 600, () => {
      setPlayerSprite('idle');
      G.enemyHp -= finalDmg; eEl.classList.add('hit-flash','enemy-shake');
      setTimeout(()=>eEl.classList.remove('hit-flash','enemy-shake'), 450);
      floatDmg('enemySprite', finalDmg, '#64b5f6');
      
      let nextLog = () => {
        ch.ult = Math.min(100, ch.ult + 20); updateHUD(); checkEnemyDead();
      };

      if(mult > 1) addLog("It's super effective!", '#ffeb3b', 800, nextLog);
      else if(mult < 1) addLog("It's not very effective...", '#aaa', 800, nextLog);
      else setTimeout(nextLog, 500);
    });

  } else if(type === 'ultimate'){
    if(ch.ult < 100){ G.busy=false; return; }
    ch.ult = 0;
    setPlayerSprite('ult');
    pEl.classList.add('ult-flash');
    document.getElementById('battleBg').classList.add('ult-flash');
    
    const mult = getTypeMultiplier(ch.type, lv.type);
    let finalDmg = Math.floor((ch.ultimate.dmg + Math.floor(Math.random()*20)) * mult);

    addLog(`${ch.name} unleashed ${ch.ultimate.name}!!!`, '#e040fb', 1000, () => {
      pEl.classList.remove('ult-flash'); document.getElementById('battleBg').classList.remove('ult-flash');
      G.enemyHp -= finalDmg; eEl.classList.add('hit-flash','enemy-shake');
      setTimeout(()=>eEl.classList.remove('hit-flash','enemy-shake'), 600);
      floatDmg('enemySprite', finalDmg, '#e040fb', 'ULTIMATE!');
      setTimeout(()=>{ setPlayerSprite('idle'); updateHUD(); checkEnemyDead(); }, 800);
    });
  }
}

function checkEnemyDead(){
  if(G.enemyHp > 0) {
    // Check boss phase
    if(G.currentLevel === 2 && G.enemyHp <= G.enemyMaxHp/2 && !G.bossPhase2) {
      G.bossPhase2 = true;
      addLog("The boss is enraged! Stats increased!", '#ff5252', 1500, () => setEnemyTurn());
    } else {
      setEnemyTurn();
    }
    return;
  }
  
  G.enemyHp = 0; updateHUD();
  clearEnemySprite();
  const lv = LEVELS[G.currentLevel];
  
  addLog(`${lv.enemyName} fainted!`, '#fff', 1200, () => {
    if(G.wave < lv.waves){
      G.wave++; 
      initWave(); 
      addLog(`Next wave! ${lv.enemyName} appeared!`, '#ffeb3b', 1200, () => {
        setPlayerTurn();
      });
    } else {
      // Heal party a bit between levels
      Object.values(G.party).forEach(p => { if(p.hp>0) p.hp = Math.min(p.maxHp, p.hp + 30); });
      addLog(`You defeated the ${lv.enemyName}!`, '#ffeb3b', 1500, () => {
        if(G.currentLevel < 2) {
          G.currentLevel++; initBattle();
        } else {
          triggerEnding();
        }
      });
    }
  });
}

function enemyAct(){
  const lv = LEVELS[G.currentLevel];
  const ch = G.activeChar;
  const eEl = document.getElementById('enemySprite');
  const pEl = document.getElementById('playerSprite');
  
  eEl.classList.add('enemy-shake');
  setTimeout(()=>eEl.classList.remove('enemy-shake'), 450);
  
  // Smart AI Decisions
  const roll = Math.random();
  let baseAtk = lv.enemyAtk + (G.bossPhase2 ? 10 : 0);
  
  if(roll < 0.2) {
    // Enemy defends/buffs
    addLog(`${lv.enemyName} is gathering energy...`, '#ccc', 1000, () => setPlayerTurn());
    return;
  }
  
  let dmg = baseAtk + Math.floor(Math.random()*8) - ch.def;
  let moveName = 'Attack';
  if(roll > 0.7 && G.wave > 1){ dmg = Math.floor(dmg * 1.5); moveName = 'Power Strike'; }
  if(G.bossPhase2 && roll > 0.5) { dmg = Math.floor(dmg * 1.8); moveName = 'Cosmic Blast'; }
  
  const mult = getTypeMultiplier(lv.type, ch.type);
  dmg = Math.max(1, Math.floor(dmg * mult));

  addLog(`${lv.enemyName} used ${moveName}!`, '#ff5252', 600, () => {
    ch.hp -= dmg; pEl.classList.add('shake');
    setTimeout(()=>{ pEl.classList.remove('shake'); }, 450);
    floatDmg('playerSprite', dmg, '#ff5252');
    
    let nextLog = () => {
      ch.ult = Math.min(100, ch.ult + 8); updateHUD();
      if(ch.hp <= 0) {
        ch.hp = 0; updateHUD();
        addLog(`${ch.name} fainted!`, '#ff5252', 1200, () => checkPartyWipe());
      } else {
        setPlayerTurn();
      }
    };

    if(mult > 1) addLog("It's super effective!", '#ffeb3b', 800, nextLog);
    else if(mult < 1) addLog("It's not very effective...", '#aaa', 800, nextLog);
    else setTimeout(nextLog, 500);
  });
}

function checkPartyWipe() {
  const alive = Object.values(G.party).filter(p => p.hp > 0);
  if(alive.length === 0) {
    addLog("You blacked out...", '#ff5252', 2000, () => {
      document.getElementById('titleScreen').classList.add('active');
      document.getElementById('battleScreen').classList.remove('active');
    });
  } else {
    // Force switch menu
    openSwitchMenu();
  }
}

// ══════════════════════════════════════════════
function openSwitchMenu() {
  const menu = document.getElementById('switchMenu');
  const cont = document.getElementById('switchCardsContainer');
  cont.innerHTML = '';
  
  Object.values(G.party).forEach(p => {
    const card = document.createElement('div');
    const isDead = p.hp <= 0;
    card.className = 'switch-card' + (isDead ? ' dead' : '');
    card.innerHTML = `
      <img src="${p.imgs.idle}" class="switch-img" onerror="this.onerror=null; drawSpriteFallback(this, '${p.key}', 'idle');"/>
      <div style="font-size:0.4rem;margin-top:5px;">${p.name}</div>
      <div class="switch-hp" style="color:${isDead?'#f00':'#10c040'}">${p.hp}/${p.maxHp}</div>
    `;
    if(!isDead && p.key !== G.activeChar.key) {
      card.onclick = () => performSwitch(p.key);
    }
    cont.appendChild(card);
  });
  menu.classList.add('active');
}

function closeSwitchMenu() {
  if(G.activeChar.hp <= 0) return; // Cannot close if current is dead
  document.getElementById('switchMenu').classList.remove('active');
}

function performSwitch(newKey) {
  document.getElementById('switchMenu').classList.remove('active');
  const oldName = G.activeChar.name;
  G.selectedChar = newKey;
  G.activeChar = G.party[newKey];
  
  G.busy = true;
  if(G.party[oldName.toLowerCase()] && G.party[oldName.toLowerCase()].hp > 0) {
    addLog(`Good job, ${oldName}! Come back!`, '#fff', 1000, () => sendOutNew());
  } else {
    sendOutNew();
  }

  function sendOutNew() {
    setPlayerSprite('idle'); updateHUD();
    addLog(`Go! ${G.activeChar.name}!`, '#ffeb3b', 1000, () => {
      setEnemyTurn();
    });
  }
}

function triggerEnding() {

  setTimeout(() => {
    const popup = document.getElementById('letterPopup');
    const txt = document.getElementById('letterContent');
    popup.classList.add('show');
    
    // Typewriter letter
    const msg = "hey there cantikk,\n\ni hope ur having fun playing this little game.\n\ni built this just for u...\n\ni lovee youu Mynaa 💌";
    let i = 0;
    txt.textContent = '';

      if(msg.charAt(i) === '\n') txt.appendChild(document.createElement('br'));

function spawnRoamingChars() {
  const cont = document.getElementById('roamingContainer');
  Object.values(CHARS_DATA).forEach(ch => {
    const el = document.createElement('img');
    el.src = ch.imgs.idle;
    el.className = 'roaming-char';
    el.onerror = () => drawSpriteFallback(el, ch.key, 'idle');
    
    // Start at bottom center
    let x = window.innerWidth/2 - 48;
    let y = window.innerHeight - 120;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    cont.appendChild(el);
    
    // Roaming logic
    setInterval(() => {
      if(Math.random() > 0.3) {
        x += (Math.random() - 0.5) * 150;
        y += (Math.random() - 0.5) * 80;
        x = Math.max(0, Math.min(window.innerWidth - 96, x));
        y = Math.max(window.innerHeight/2, Math.min(window.innerHeight - 96, y));
        el.style.transform = `translate(${x - parseFloat(el.style.left)}px, ${y - parseFloat(el.style.top)}px)`;
        el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.transform = 'none';
        el.style.animation = 'walkBounce 0.3s ease 2';
        setTimeout(()=>el.style.animation='', 600);
        
        // Random heart pop
        if(Math.random() > 0.7) {
          const h = document.createElement('div');
          h.className = 'roam-heart'; h.textContent = '❤';
          h.style.left = (x + 32) + 'px'; h.style.top = (y - 20) + 'px';
          cont.appendChild(h);
          setTimeout(()=>h.remove(), 1500);
        }
      }
    }, 2000 + Math.random()*2000);
  });
}

// Simple Fireworks System
function initFireworks() {
  const cv = document.getElementById('fireworksCanvas');
  const ctx = cv.getContext('2d');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  let particles = [];
  
  function createExplosion(x,y,c) {
    for(let i=0; i<30; i++) {
      particles.push({ x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color:c });
    }
  }
  
  function animate() {
    ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
    ctx.fillRect(0,0,cv.width,cv.height);
    
    if(Math.random() < 0.05) {
      const colors = ['#f07898','#00e5ff','#ffe234','#ff00aa'];
      createExplosion(Math.random()*cv.width, Math.random()*cv.height/2, colors[Math.floor(Math.random()*colors.length)]);
    }
    
    for(let i=particles.length-1; i>=0; i--) {
      let p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillRect(p.x, p.y, 4, 4);
      if(p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
  }
  animate();
}

  const bl=document.getElementById('buildingsLayer');

    bl.appendChild(b);
  });
}
function makeRain(){
  const rl=document.getElementById('rainLayer');
  for(let i=0;i<50;i++){
    const d=document.createElement('div'); d.className='raindrop';
    d.style.cssText=`left:${Math.random()*100}%;height:${8+Math.random()*18}px;animation-duration:${.35+Math.random()*.35}s;animation-delay:${Math.random()*1}s;`;
    rl.appendChild(d);

function drawGalaxy(){
  const cv=document.getElementById('galaxyCanvas'); if(!cv) return;
  cv.width=cv.offsetWidth||600; cv.height=cv.offsetHeight||400;
  const ctx=cv.getContext('2d');
  for(let i=0;i<250;i++){
    ctx.beginPath(); ctx.arc(Math.random()*cv.width,Math.random()*cv.height,Math.random()*1.8,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${.2+Math.random()*.8})`; ctx.fill();
  }
}
