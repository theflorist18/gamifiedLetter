<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mynaa's Battle Quest 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="titleScreen" class="screen active">
  <div class="title-bg-anim"></div>
  <div class="title-stars" id="titleStars"></div>
  <div class="title-logo">
    <img id="titleCatImg" src="assets/characters/nyom_ult.png" alt="Nyom Cat"
         style="width:140px;height:140px;image-rendering:pixelated;object-fit:contain;margin:0 auto 20px;display:block;filter:drop-shadow(0 0 20px #f07898);animation:titlePulse 1.5s ease-in-out infinite;"/>
    <h1>MYNAA'S<br>BATTLE QUEST</h1>
    <div class="love-tag">💌 hey there cantikk, i lovee youu 💌</div>
    <div class="press-start">▶ PRESS ANYWHERE TO START</div>
  </div>
</div>

<div id="selectScreen" class="screen">
  <div class="select-title">✦ CHOOSE YOUR LEAD FIGHTER ✦</div>
  <div class="char-cards" id="charCards"></div>
  <button class="select-btn" onclick="startBattle()">⚔ BATTLE START ⚔</button>
</div>

<div id="battleScreen" class="screen">
  <div class="battle-wrap" id="battleWrap">
    <div class="battle-bg bg-city" id="battleBg">
      <div class="rain" id="rainLayer"></div>
      <div id="galaxyLayer" style="display:none">
        <div class="galaxy-heart">💜</div>
        <canvas id="galaxyCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;"></canvas>
      </div>
    </div>

    <div class="arena" id="arena">
      <div class="effect-overlay" id="effectLayer"></div>

      <div class="sprite-wrap" id="enemySprite">
        <canvas id="enemyCanvas" width="128" height="128" style="image-rendering:pixelated;display:block;"></canvas>
        <div class="sprite-shadow"></div>
        <div class="status-icon" id="enemyStatusIcon"></div>
      </div>
      <div class="status-panel" id="enemyStatus">
        <div class="hud-name">
          <span id="enemyName">ENEMY</span>
          <span class="hud-level" id="enemyLevel">Lv?</span>
        </div>
        <div class="bar-track bar-track-hp"><div class="bar-fill bar-hp" id="enemyHpBar" style="width:100%"></div></div>
        <div class="bar-labels"><span id="enemyHpNum">100/100</span><span>HP</span></div>
      </div>

      <div class="sprite-wrap" id="playerSprite">
        <img id="playerImg" class="sprite-img" src="" alt="player"/>
        <div class="sprite-shadow"></div>
        <div class="status-icon" id="playerStatusIcon"></div>
      </div>
      <div class="status-panel" id="playerStatus">
        <div class="hud-name">
          <span id="playerName">PLAYER</span>
          <span class="hud-level" id="playerLevel">Lv1</span>
        </div>
        <div class="bar-track bar-track-hp"><div class="bar-fill bar-hp" id="playerHpBar" style="width:100%"></div></div>
        <div class="bar-labels"><span id="playerHpNum">100/100</span><span>HP</span></div>
        <div class="bar-sub-labels">
          <span class="bar-sub-label">MP</span>
          <span class="bar-sub-label">ULT</span>
        </div>
        <div class="bar-track bar-track-mp"><div class="bar-fill bar-mp" id="playerMpBar" style="width:100%"></div></div>
        <div class="bar-track bar-track-ult"><div class="bar-fill bar-ult" id="playerUltBar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="dialogue-box">
      <div class="log-text-area" id="logTextArea" onclick="advanceDialogue()"></div>
      <div class="action-grid" id="actionPanel">
        <button class="action-btn btn-attack" id="btn-attack" onclick="doAction('attack')">
          <span class="a-icon">⚔️</span>
          <span class="a-label">ATTACK</span>
          <span class="cost">BASIC</span>
        </button>
        <button class="action-btn btn-skill" id="btn-skill" onclick="doAction('skill')">
          <span class="a-icon" id="skillIcon">✨</span>
          <span class="a-label" id="skillName">SKILL</span>
          <span class="cost" id="skillCost">30 MP</span>
        </button>
        <button class="action-btn btn-switch" id="btn-switch" onclick="openSwitchMenu()">
          <span class="a-icon">🔄</span>
          <span class="a-label">SWITCH</span>
          <span class="cost">PARTY</span>
        </button>
        <button class="action-btn btn-ult" id="btn-ult" onclick="doAction('ultimate')">
          <span class="a-icon" id="ultIcon">💥</span>
          <span class="a-label">ULTIMATE</span>
          <span class="cost">100% ULT</span>
        </button>
      </div>
    </div>
  </div>

  <div id="switchMenu">
    <div class="switch-title">✦ CHOOSE YOUR FIGHTER ✦</div>
    <div class="switch-cards" id="switchCardsContainer"></div>
    <button class="switch-cancel" onclick="closeSwitchMenu()">CANCEL</button>
  </div>
</div>

<div id="endScreen" class="screen">
  <canvas id="fireworksCanvas"></canvas>
  <div class="letter-popup" id="letterPopup">
    <div id="letterContent"></div>
  </div>
  <div id="roamingContainer" style="position:absolute;inset:0;pointer-events:none;z-index:5;"></div>
</div>

<script src="script.js"></script>
</body>
</html>
