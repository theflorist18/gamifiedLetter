<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mynaa's Battle Quest 💖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;}
:root{
  --bg:#0a0a1a;--pink1:#f07898;--pink2:#e8a0b8;--dark-pink:#a03060;
  --purple1:#5a3a8a;--cyan:#00e5ff;--yellow:#ffe234;--red:#ff3a3a;
  --white:#f0f4ff;--shadow:rgba(0,0,0,0.7);
}
body{background:var(--bg);font-family:'Press Start 2P',monospace;color:var(--white);
  min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
canvas{image-rendering:pixelated;display:block;}

/* SPRITE IMAGES */
.sprite-img{
  image-rendering:pixelated;
  display:block;
  width:128px;
  height:128px;
  object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6));
  transition:filter 0.1s;
}
.sprite-img.hit-flash{animation:hitFlash .3s ease;}
.sprite-img.shake{animation:shake .4s ease;}
.sprite-img.enemy-shake{animation:eshake .4s ease;}
.sprite-img.ult-flash{animation:ultFlash .7s ease;}
.char-card-img{
  image-rendering:pixelated;
  width:100px;height:100px;
  object-fit:contain;
  display:block;
  margin:0 auto;
}

/* SCREENS */
.screen{display:none;width:100vw;height:100vh;position:absolute;top:0;left:0;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* TITLE */
#titleScreen{
  background:radial-gradient(ellipse at 50% 40%,#1a0a3a 0%,#0a0a1a 70%);
  cursor:pointer;position:relative;overflow:hidden;
}
.title-stars{position:absolute;inset:0;pointer-events:none;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:1}}
.title-logo{text-align:center;z-index:10;position:relative;}
.title-logo h1{font-size:clamp(.7rem,2.5vw,1.4rem);color:var(--pink1);
  text-shadow:0 0 20px var(--pink1),4px 4px 0 var(--dark-pink);
  line-height:1.7;animation:titlePulse 1.5s ease-in-out infinite;}
@keyframes titlePulse{0%,100%{text-shadow:0 0 20px var(--pink1),4px 4px 0 var(--dark-pink)}
  50%{text-shadow:0 0 40px var(--pink1),0 0 60px var(--pink2),4px 4px 0 var(--dark-pink)}}
.love-tag{font-size:.55rem;color:var(--pink2);margin-top:10px;font-family:'VT323';font-size:1.1rem;}
.press-start{margin-top:28px;font-size:.5rem;color:var(--yellow);animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* SELECT */
#selectScreen{background:radial-gradient(ellipse at 50% 30%,#1a0530 0%,#0a0a1a 80%);}
.select-title{font-size:.6rem;color:var(--cyan);margin-bottom:20px;text-align:center;letter-spacing:2px;}
.char-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;padding:0 12px;}
.char-card{
  background:rgba(255,255,255,.04);border:3px solid var(--purple1);
  padding:12px 10px;cursor:pointer;transition:all .1s;text-align:center;width:150px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
.char-card:hover,.char-card.selected{
  border-color:var(--pink1);background:rgba(255,110,180,.1);
  transform:translateY(-4px);box-shadow:0 0 20px rgba(255,110,180,.4);
}
.char-card-name{font-size:.38rem;color:var(--pink2);margin-top:8px;}
.char-card-type{font-family:'VT323';font-size:.95rem;color:#8899bb;margin-top:3px;}
.char-card-stats{font-family:'VT323';font-size:.85rem;color:#8899bb;margin-top:6px;line-height:1.7;}
.select-btn{
  margin-top:20px;background:var(--pink1);color:#1a0030;border:none;
  padding:12px 22px;font-family:'Press Start 2P';font-size:.5rem;cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
  transition:all .1s;
}
.select-btn:hover{background:var(--pink2);transform:scale(1.05);}

/* BATTLE */
#battleScreen{padding:0;overflow:hidden;}
.battle-wrap{width:100%;height:100vh;display:flex;flex-direction:column;position:relative;}

/* Backgrounds */
.battle-bg{position:absolute;inset:0;z-index:0;transition:opacity .5s;}
.bg-city{background:linear-gradient(180deg,#060015 0%,#0d0028 25%,#180040 45%,#0d001a 65%,#060012 100%);}
.bg-study{background:linear-gradient(180deg,#050200 0%,#100800 30%,#1e1000 55%,#120a00 100%);}
.bg-galaxy{background:radial-gradient(ellipse at 50% 55%,#3a0060 0%,#1a0035 35%,#0a0020 70%,#040010 100%);}

.ground{position:absolute;bottom:0;left:0;right:0;height:32%;z-index:1;}
.ground-city{background:linear-gradient(180deg,#150028 0%,#0a0018 50%,#060010 100%);border-top:3px solid #5500aa;}
.ground-city::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(100,0,200,.12) 48px,rgba(100,0,200,.12) 50px);}
.ground-study{background:linear-gradient(180deg,#201000 0%,#140a00 100%);border-top:3px solid #a06020;}
.ground-galaxy{background:radial-gradient(ellipse at 50% 0%,#280050 0%,#100020 60%,#060010 100%);border-top:3px solid #9900cc;}

/* HUD */
.hud{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;
  padding:8px 12px 6px;background:rgba(0,0,0,.7);border-bottom:2px solid var(--purple1);gap:8px;}
.hud-block{flex:1;min-width:0;}
.hud-name{font-size:.32rem;color:var(--pink2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-wrap{height:9px;background:#111122;border:1px solid #333;position:relative;margin-bottom:2px;}
.bar-fill{height:100%;transition:width .5s;}
.bar-hp{background:linear-gradient(90deg,#dd2020,#ff5050);}
.bar-mp{background:linear-gradient(90deg,#2040cc,#4080ff);}
.bar-ult{background:linear-gradient(90deg,#9900cc,#ff00aa);}
.bar-label{font-size:.25rem;color:#8899bb;display:flex;justify-content:space-between;font-family:'VT323';font-size:.7rem;}
.hud-center{text-align:center;flex:0 0 auto;}
.level-badge{font-size:.32rem;color:var(--yellow);border:1px solid var(--yellow);padding:2px 5px;}
.turn-label{font-size:.28rem;color:var(--cyan);margin-top:3px;}
.wave-label{font-size:.22rem;color:#8899bb;margin-top:2px;font-family:'VT323';font-size:.65rem;}

/* Arena */
.arena{position:relative;flex:1;z-index:2;display:flex;align-items:flex-end;
  justify-content:space-between;padding:0 32px 0;}
.sprite-wrap{display:flex;flex-direction:column;align-items:center;position:relative;z-index:5;padding-bottom:6px;}
.sprite-wrap.enemy{transform:scaleX(-1);}
.sprite-shadow{width:90px;height:10px;background:radial-gradient(ellipse,rgba(0,0,0,.5) 0%,transparent 70%);
  margin-top:-2px;border-radius:50%;}

/* Battle log */
.battle-log{position:relative;z-index:10;background:rgba(0,0,0,.88);border-top:2px solid var(--purple1);
  min-height:52px;padding:6px 12px;color:var(--white);line-height:1.5;font-family:'VT323';font-size:.95rem;}
.log-line{opacity:0;animation:fadeLog .3s ease forwards;}
@keyframes fadeLog{to{opacity:1}}

/* Actions */
.action-panel{position:relative;z-index:10;background:rgba(4,0,18,.97);
  border-top:2px solid var(--pink1);padding:7px 8px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.action-btn{background:rgba(255,255,255,.04);border:2px solid var(--purple1);color:var(--white);
  padding:7px 3px;font-family:'Press Start 2P';font-size:.25rem;cursor:pointer;
  transition:all .1s;text-align:center;line-height:1.6;
  clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,4px 100%,0 calc(100% - 4px));}
.action-btn:hover:not(:disabled){border-color:var(--pink1);background:rgba(255,110,180,.15);transform:translateY(-2px);}
.action-btn:disabled{opacity:.35;cursor:not-allowed;}
.action-btn .a-icon{font-size:13px;display:block;margin-bottom:2px;}
.action-btn .a-name{color:var(--pink2);display:block;}
.action-btn .a-cost{color:var(--cyan);font-family:'VT323';font-size:.65rem;display:block;margin-top:1px;}
.action-btn.ultimate{border-color:var(--yellow);}
.action-btn.ultimate:hover:not(:disabled){background:rgba(255,226,52,.15);box-shadow:0 0 12px rgba(255,226,52,.4);}

/* Effects */
.effect-overlay{position:absolute;inset:0;pointer-events:none;z-index:20;}
.hit-flash{animation:hitFlash .3s ease;}
@keyframes hitFlash{0%,100%{filter:none}50%{filter:brightness(3) saturate(0)}}
.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.enemy-shake{animation:eshake .4s ease;}
@keyframes eshake{0%,100%{transform:scaleX(-1) translateX(0)}20%{transform:scaleX(-1) translateX(-6px)}40%{transform:scaleX(-1) translateX(6px)}}
.ult-flash{animation:ultFlash .7s ease;}
@keyframes ultFlash{0%,100%{filter:none}30%{filter:brightness(4) hue-rotate(180deg)}60%{filter:brightness(2) saturate(3)}}
.float-dmg{position:fixed;font-family:'Press Start 2P';font-size:.55rem;font-weight:bold;
  pointer-events:none;z-index:300;animation:floatUp 1.1s ease forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}

/* Neon signs */
.neon-signs{position:absolute;top:10%;left:3%;right:3%;display:flex;justify-content:space-around;z-index:3;}
.neon-sign{font-family:'Press Start 2P';font-size:.28rem;padding:3px 7px;border:1px solid;animation:neonFlicker 4s step-end infinite;}
.ns-pink{color:#ff6eb4;border-color:#ff6eb4;text-shadow:0 0 8px #ff6eb4;box-shadow:0 0 8px rgba(255,110,180,.3);}
.ns-cyan{color:#00e5ff;border-color:#00e5ff;text-shadow:0 0 8px #00e5ff;box-shadow:0 0 8px rgba(0,229,255,.3);}
.ns-yellow{color:#ffe234;border-color:#ffe234;text-shadow:0 0 8px #ffe234;}
@keyframes neonFlicker{0%,88%,90%,92%,100%{opacity:1}89%,91%{opacity:.2}}

/* Rain */
.rain{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:hidden;}
.raindrop{position:absolute;width:1px;background:linear-gradient(transparent,rgba(140,180,255,.35));animation:fall linear infinite;}
@keyframes fall{from{transform:translateY(-100%)}to{transform:translateY(100vh)}}

/* Study books */
.book{position:absolute;z-index:4;font-family:'Press Start 2P';font-size:.28rem;padding:5px 9px;
  animation:bookFloat 3s ease-in-out infinite;}
.book-ujian{bottom:50%;left:12%;background:#6a0000;color:#fff;border-left:4px solid #ff4444;box-shadow:3px 3px 0 rgba(0,0,0,.5);}
.book-tugas{bottom:53%;left:38%;background:#002855;color:#fff;border-left:4px solid #4488ff;box-shadow:3px 3px 0 rgba(0,0,0,.5);animation-delay:-1s;}
.book-tilaron{bottom:50%;right:8%;background:#004a22;color:#fff;border-left:4px solid #44ff88;box-shadow:3px 3px 0 rgba(0,0,0,.5);animation-delay:-2s;}
@keyframes bookFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}

/* Galaxy */
.galaxy-heart{position:absolute;bottom:38%;left:50%;transform:translateX(-50%);
  font-size:clamp(2.5rem,7vw,5rem);animation:heartbeat 1.5s ease-in-out infinite;z-index:3;
  filter:drop-shadow(0 0 18px #cc00ff) drop-shadow(0 0 35px #ff00aa);}
@keyframes heartbeat{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.1)}}

/* Result */
#resultScreen{background:radial-gradient(ellipse at 50% 40%,#1a0035 0%,#0a0015 80%);}
.result-title{font-size:clamp(.8rem,3vw,1.8rem);margin-bottom:14px;text-align:center;}
.result-title.win{color:var(--yellow);text-shadow:0 0 20px var(--yellow),4px 4px 0 #806000;}
.result-title.lose{color:var(--red);text-shadow:0 0 20px var(--red),4px 4px 0 #600000;}
.result-sub{font-size:.42rem;color:var(--pink2);margin-bottom:22px;text-align:center;line-height:2.2;font-family:'VT323';font-size:1rem;}
.result-btn{background:transparent;border:2px solid var(--pink1);color:var(--pink1);
  padding:10px 18px;font-family:'Press Start 2P';font-size:.45rem;cursor:pointer;margin:5px;transition:all .1s;}
.result-btn:hover{background:var(--pink1);color:#1a0030;}
</style>
</head>
<body>

<!-- TITLE -->
<div id="titleScreen" class="screen active">
  <div class="title-stars" id="titleStars"></div>
  <div class="title-logo">
    <canvas id="titleCatCanvas" width="128" height="128" style="display:none;"></canvas>
    <img id="titleCatImg" src="assets/characters/nyom_ult.png" alt="Nyom Cat"
         style="width:128px;height:128px;image-rendering:pixelated;object-fit:contain;margin:0 auto 14px;display:block;filter:drop-shadow(0 0 16px #f07898);animation:titlePulse 1.5s ease-in-out infinite;"/>
    <h1>MYNAA'S<br>BATTLE QUEST</h1>
    <div class="love-tag">💌 hey there cantikk, i lovee youu 💌</div>
    <div class="press-start">▶ PRESS ANYWHERE TO START</div>
  </div>
</div>

<!-- SELECT -->
<div id="selectScreen" class="screen">
  <div class="select-title">✦ CHOOSE YOUR FIGHTER ✦</div>
  <div class="char-cards" id="charCards"></div>
  <button class="select-btn" onclick="startBattle()">⚔ BATTLE START ⚔</button>
</div>

<!-- BATTLE -->
<div id="battleScreen" class="screen">
  <div class="battle-wrap" id="battleWrap">
    <div class="battle-bg bg-city" id="battleBg">
      <div class="rain" id="rainLayer"></div>
      <div class="neon-signs" id="neonSigns">
        <div class="neon-sign ns-pink">TOKO<br>BITUNG</div>
        <div class="neon-sign ns-cyan">WARUNG<br>KOPI</div>
        <div class="neon-sign ns-yellow">TAPITUR<br>AN</div>
      </div>
      <div class="buildings" id="buildingsLayer" style="position:absolute;bottom:32%;left:0;right:0;display:flex;align-items:flex-end;gap:1px;"></div>
      <div id="studyLayer" style="display:none">
        <div class="book book-ujian">Ujian!</div>
        <div class="book book-tugas">Tugas</div>
        <div class="book book-tilaron">Tilaron</div>
      </div>
      <div id="galaxyLayer" style="display:none">
        <div class="galaxy-heart">💜</div>
        <canvas id="galaxyCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;"></canvas>
      </div>
    </div>
    <div class="ground ground-city" id="battleGround"></div>

    <div class="hud" id="hud">
      <div class="hud-block">
        <div class="hud-name" id="playerName">PLAYER</div>
        <div class="bar-wrap"><div class="bar-fill bar-hp" id="playerHpBar" style="width:100%"></div></div>
        <div class="bar-label"><span>HP</span><span id="playerHpNum">100/100</span></div>
        <div class="bar-wrap"><div class="bar-fill bar-mp" id="playerMpBar" style="width:100%"></div></div>
        <div class="bar-label"><span>MP</span><span id="playerMpNum">100/100</span></div>
        <div class="bar-wrap" style="margin-top:1px"><div class="bar-fill bar-ult" id="playerUltBar" style="width:0%"></div></div>
        <div class="bar-label"><span style="color:#cc00ff">ULT</span><span id="playerUltNum">0/100</span></div>
      </div>
      <div class="hud-center">
        <div class="level-badge" id="levelBadge">LVL 1</div>
        <div class="turn-label" id="turnLabel">YOUR TURN</div>
        <div class="wave-label" id="waveLabel">WAVE 1/3</div>
      </div>
      <div class="hud-block" style="text-align:right">
        <div class="hud-name" id="enemyName">ENEMY</div>
        <div class="bar-wrap"><div class="bar-fill bar-hp" id="enemyHpBar" style="width:100%"></div></div>
        <div class="bar-label"><span id="enemyHpNum">100/100</span><span>HP</span></div>
      </div>
    </div>

    <div class="arena" id="arena">
      <div class="effect-overlay" id="effectLayer"></div>
      <div class="sprite-wrap" id="playerSprite">
        <img id="playerImg" class="sprite-img" src="" alt="player"/>
        <div class="sprite-shadow"></div>
      </div>
      <div class="sprite-wrap enemy" id="enemySprite">
        <img id="enemyImg" class="sprite-img" src="" alt="enemy"/>
        <div class="sprite-shadow"></div>
      </div>
    </div>

    <div class="battle-log" id="battleLog"></div>

    <div class="action-panel" id="actionPanel">
      <button class="action-btn" id="btn-attack" onclick="doAction('attack')">
        <span class="a-icon">⚔️</span><span class="a-name">ATTACK</span><span class="a-cost">0 MP</span>
      </button>
      <button class="action-btn" id="btn-skill" onclick="doAction('skill')">
        <span class="a-icon" id="skillIcon">✨</span><span class="a-name" id="skillName">SKILL</span><span class="a-cost" id="skillCost">30 MP</span>
      </button>
      <button class="action-btn ultimate" id="btn-ult" onclick="doAction('ultimate')">
        <span class="a-icon" id="ultIcon">💥</span><span class="a-name" id="ultName">ULTIMATE</span><span class="a-cost">100 ULT</span>
      </button>
      <button class="action-btn" id="btn-defend" onclick="doAction('defend')">
        <span class="a-icon">🛡️</span><span class="a-name">DEFEND</span><span class="a-cost">+15 MP</span>
      </button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <img id="resultImg" src="" alt="result" style="width:128px;height:128px;image-rendering:pixelated;object-fit:contain;margin-bottom:14px;filter:drop-shadow(0 0 16px #f07898);"/>
  <canvas id="resultCanvas" width="128" height="128" style="display:none;"></canvas>
  <div class="result-title" id="resultTitle">VICTORY!</div>
  <div class="result-sub" id="resultSub"></div>
  <div>
    <button class="result-btn" id="nextBtn" onclick="nextLevel()">NEXT LEVEL ▶</button>
    <button class="result-btn" onclick="goSelect()">CHANGE CHAR</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  PIXEL DRAWING ENGINE
//  Each sprite is on a 32×32 grid, drawn at scale P
// ══════════════════════════════════════════════
const P = 4; // each "pixel" in the sprite = 4 real pixels → 128px canvas

function px(ctx, pixels, offX, offY, scale) {
  const sc = scale || P;
  for (const [x, y, c] of pixels) {
    ctx.fillStyle = c;
    ctx.fillRect(offX + x * sc, offY + y * sc, sc, sc);
  }
}

function clearCanvas(canvas) {
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function drawSprite(canvas, pixelsFn, scale) {
  const sc = scale || P;
  clearCanvas(canvas);
  canvas.width = 32 * sc;
  canvas.height = 32 * sc;
  const ctx = canvas.getContext('2d');
  px(ctx, pixelsFn(), 0, 0, sc);
}

// ══════════════════════════════════════════════
//  COLOUR PALETTES
// ══════════════════════════════════════════════
// Pink Cat (Nyom)
const C = {
  BK:'#000000', TR:'transparent',
  // Pink cat
  PK1:'#f07898', PK2:'#e85888', PK3:'#d03870', PK4:'#b82060', // medium pinks / darks
  PK5:'#f8b0c8', PK6:'#fcd8e8', PK7:'#fce8f0', // light pinks
  PK8:'#c84878', PK9:'#a03060', // deep pink
  PKST:'#b83068', // stripe colour
  WH:'#ffffff', WH2:'#f5e8ee',
  // Grey cat
  GR1:'#5a7080', GR2:'#6a8090', GR3:'#7a90a0', GR4:'#4a6070',
  GR5:'#3a5060', GR6:'#8aaabb', GR7:'#aabccc',
  // Cat face inside hood
  OR1:'#c87820', OR2:'#d89030', OR3:'#e8a840', OR4:'#b06010',
  OR5:'#f0c060',
  WCAT:'#f8f0e8', // white of calico
  // Car
  CA1:'#111111', CA2:'#1a1a1a', CA3:'#222222', CA4:'#2a2a2a',
  CA5:'#333333', CA6:'#3a3a3a', CA7:'#444444', CA8:'#555555',
  CA9:'#4a5a6a', // blue glass
  CAL:'#c0ccdd', // headlight
  CAR:'#ff3333', // taillight
  // Shared
  OUTLINE:'#1a0a1a',
  EYES_BLUE:'#2244bb', EYES_BLUE2:'#3366ee', EYES_GLOW:'#8844ff',
  PINK_NOSE:'#ffaacc', NOSE2:'#ffbbdd',
};

// ══════════════════════════════════════════════
//  PINK CAT — IDLE (chonky rounded square shape, tiger stripes, small ears)
// ══════════════════════════════════════════════
function pinkCat_idle() {
  return [
    // ── ears (small round bumps at top, slightly left and right of center)
    [11,0,C.BK],[12,0,C.PK2],[13,0,C.PK1],[14,0,C.BK],
    [10,1,C.BK],[11,1,C.PK3],[12,1,C.PK1],[13,1,C.PK2],[14,1,C.BK],
    [18,0,C.BK],[19,0,C.PK1],[20,0,C.PK2],[21,0,C.BK],
    [18,1,C.BK],[19,1,C.PK1],[20,1,C.PK2],[21,1,C.PK3],[22,1,C.BK],
    // stripe tufts on top center (dark pink / magenta stripes)

    name:'NEO CAT', type:'Starry Eyes',
    hp:100,mp:120, atk:18,def:16,spd:20,
    idle:greyCat_idle, attack:greyCat_attack, ult:greyCat_ult,
    imgs:{ idle:'assets/characters/neo_idle.png', attack:'assets/characters/neo_attack.png', ult:'assets/characters/neo_ult.png' },
    color:'#5a8aaa',
    skill:{name:'HEART BEAM',mp:30,dmg:30,desc:'Love is power!'},
    ultimate:{name:'STARRY EYES',dmg:75,desc:'Galaxy magic unleashed!'},
    skillIcon:'💜', ultIcon:'⭐',
  },
  car:{
    name:'RAIZE BEAST', type:'Peks Drifting',
    hp:150,mp:80, atk:28,def:20,spd:15,
    idle:car_idle, attack:car_attack, ult:car_ult,
    imgs:{ idle:'assets/characters/car_idle.png', attack:'assets/characters/car_attack.png', ult:'assets/characters/car_ult.png' },
    color:'#aabbcc',
    skill:{name:'PEKS DRIFT',mp:20,dmg:40,desc:'Burnout attack!'},
    ultimate:{name:'TURBO DRIFT',dmg:90,desc:'Maximum PEKS DRIFTING!'},
    skillIcon:'🚗', ultIcon:'💨',
  },
};

const LEVELS = [
  {name:'CITY STREETS',bg:'city',ground:'city',enemyFn:enemy_thug,enemyName:'STREET PUNK',
   enemyImg:'assets/characters/enemy_thug.png',
   enemyHp:80,enemyAtk:15,enemyDef:8,waves:3,music:'🌆'},
  {name:'STUDY ROOM',bg:'study',ground:'study',enemyFn:enemy_books,enemyName:'EXAM DREAD',
   enemyImg:'assets/characters/enemy_books.png',
   enemyHp:100,enemyAtk:18,enemyDef:10,waves:3,music:'📚'},
  {name:'GALAXY HEART',bg:'galaxy',ground:'galaxy',enemyFn:enemy_boss,enemyName:'COSMIC BOSS',
   enemyImg:'assets/characters/enemy_boss.png',
   enemyHp:160,enemyAtk:25,enemyDef:15,waves:1,music:'💜'},
];

// ══════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════
let G = {
  selectedChar:'pinkyom', currentLevel:0, wave:1,
  playerChar:null, playerHp:0,playerMaxHp:0, playerMp:0,playerMaxMp:0,
  playerUlt:0, playerDef:false, enemyHp:0,enemyMaxHp:0,
  playerTurn:true, busy:false,
};

// ══════════════════════════════════════════════
//  TITLE
// ══════════════════════════════════════════════
function initTitle(){
  const sc = document.getElementById('titleStars');
  sc.innerHTML='';
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-delay:${Math.random()*2}s;animation-duration:${1+Math.random()*2}s`;
    sc.appendChild(s);
  }
  document.getElementById('titleScreen').onclick=()=>showSelect();
}

// ══════════════════════════════════════════════
//  CHARACTER SELECT
// ══════════════════════════════════════════════
function showSelect(){
  switchScreen('selectScreen');
  const cont=document.getElementById('charCards');
  cont.innerHTML='';
  Object.entries(CHARS).forEach(([key,ch])=>{
    const card=document.createElement('div');
    card.className='char-card'+(key===G.selectedChar?' selected':'');
    const img=document.createElement('img');
    img.src=ch.imgs.idle;
    img.className='char-card-img';
    img.alt=ch.name;
    card.appendChild(img);
    card.innerHTML+=`<div class="char-card-name">${ch.name}</div><div class="char-card-type">${ch.type}</div><div class="char-card-stats">❤ ${ch.hp} | ⚡ ${ch.atk}<br>🛡 ${ch.def} | 💨 ${ch.spd}</div>`;
    card.onclick=()=>{
      document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected'); G.selectedChar=key;
    };
    cont.appendChild(card);
  });
}

// ══════════════════════════════════════════════
//  BATTLE INIT
// ══════════════════════════════════════════════
// ── Sprite image helpers ──
function setPlayerSprite(state){
  // state = 'idle' | 'attack' | 'ult'
  const img = document.getElementById('playerImg');
  img.src = G.playerChar.imgs[state] || G.playerChar.imgs.idle;
}
function setEnemySprite(src){
  document.getElementById('enemyImg').src = src;
}
function clearEnemySprite(){
  document.getElementById('enemyImg').src = '';
}

function startBattle(){ G.currentLevel=0; initBattle(); }

function initBattle(){
  const lv=LEVELS[G.currentLevel];
  const ch=CHARS[G.selectedChar];
  G.playerChar=ch;
  G.playerHp=ch.hp; G.playerMaxHp=ch.hp;
  G.playerMp=ch.mp; G.playerMaxMp=ch.mp;
  G.playerUlt=0; G.playerDef=false; G.wave=1; G.busy=false; G.playerTurn=true;
  initWave();

  // Backgrounds
  const bg=document.getElementById('battleBg');
  bg.className='battle-bg bg-'+lv.bg;
  document.getElementById('battleGround').className='ground ground-'+lv.ground;
  document.getElementById('rainLayer').innerHTML='';
  document.getElementById('neonSigns').style.display='none';
  document.getElementById('buildingsLayer').innerHTML='';
  document.getElementById('studyLayer').style.display='none';
  document.getElementById('galaxyLayer').style.display='none';

  if(lv.bg==='city'){
    document.getElementById('neonSigns').style.display='flex';
    buildCity(); makeRain();
  } else if(lv.bg==='study'){
    document.getElementById('studyLayer').style.display='block';
  } else {
    document.getElementById('galaxyLayer').style.display='block';
    drawGalaxy();
  }

  // Set sprites from asset images
  setPlayerSprite('idle');
  setEnemySprite(lv.enemyImg);

  document.getElementById('playerName').textContent=ch.name;
  document.getElementById('levelBadge').textContent='LVL '+(G.currentLevel+1);
  document.getElementById('skillIcon').textContent=ch.skillIcon;
  document.getElementById('skillName').textContent=ch.skill.name.split(' ')[0];
  document.getElementById('skillCost').textContent=ch.skill.mp+' MP';
  document.getElementById('ultIcon').textContent=ch.ultIcon;
  document.getElementById('ultName').textContent='ULTIMATE';

  updateHUD();
  setLog('⚔ '+lv.music+' '+lv.name+' — FIGHT!');
  switchScreen('battleScreen');
  setPlayerTurn();
}

function initWave(){
  const lv=LEVELS[G.currentLevel];
  const m=1+(G.wave-1)*.3;
  G.enemyHp=Math.floor(lv.enemyHp*m); G.enemyMaxHp=G.enemyHp;
  document.getElementById('waveLabel').textContent='WAVE '+G.wave+'/'+lv.waves;
  document.getElementById('enemyName').textContent=G.wave>1?lv.enemyName+' ★':lv.enemyName;
  setEnemySprite(lv.enemyImg);
}

function buildCity(){
  const bl=document.getElementById('buildingsLayer');
  const cols=['#120020','#0a0018','#180035','#080012','#1a0040'];
  [90,130,80,150,110,70,120,90,140,80,100,120,85].forEach((h,i)=>{
    const b=document.createElement('div');
    const w=20+Math.random()*35;
    b.style.cssText=`width:${w}px;height:${h}px;background:${cols[i%cols.length]};flex-shrink:0;position:relative;`;
    b.style.backgroundImage='repeating-linear-gradient(0deg,transparent,transparent 9px,rgba(255,200,50,.06) 9px,rgba(255,200,50,.06) 11px),repeating-linear-gradient(90deg,transparent,transparent 7px,rgba(255,200,50,.05) 7px,rgba(255,200,50,.05) 9px)';
    bl.appendChild(b);
  });
}

function makeRain(){
  const rl=document.getElementById('rainLayer');
  for(let i=0;i<50;i++){
    const d=document.createElement('div');
    d.className='raindrop';
    d.style.cssText=`left:${Math.random()*100}%;height:${8+Math.random()*18}px;animation-duration:${.35+Math.random()*.35}s;animation-delay:${Math.random()*1}s;`;
    rl.appendChild(d);
  }
}

function drawGalaxy(){
  const cv=document.getElementById('galaxyCanvas');
  if(!cv) return;
  cv.width=cv.offsetWidth||600; cv.height=cv.offsetHeight||400;
  const ctx=cv.getContext('2d');
  for(let i=0;i<250;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*cv.width,Math.random()*cv.height,Math.random()*1.8,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${.2+Math.random()*.8})`;
    ctx.fill();
  }
}

// ══════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════
function updateHUD(){
  document.getElementById('playerHpBar').style.width=(G.playerHp/G.playerMaxHp*100)+'%';
  document.getElementById('playerHpNum').textContent=G.playerHp+'/'+G.playerMaxHp;
  document.getElementById('playerMpBar').style.width=(G.playerMp/G.playerMaxMp*100)+'%';
  document.getElementById('playerMpNum').textContent=G.playerMp+'/'+G.playerMaxMp;
  document.getElementById('playerUltBar').style.width=G.playerUlt+'%';
  document.getElementById('playerUltNum').textContent=G.playerUlt+'/100';
  document.getElementById('enemyHpBar').style.width=(Math.max(0,G.enemyHp)/G.enemyMaxHp*100)+'%';
  document.getElementById('enemyHpNum').textContent=Math.max(0,G.enemyHp)+'/'+G.enemyMaxHp;
  document.getElementById('btn-skill').disabled=G.playerMp<G.playerChar.skill.mp||!G.playerTurn||G.busy;
  document.getElementById('btn-ult').disabled=G.playerUlt<100||!G.playerTurn||G.busy;
  document.getElementById('btn-attack').disabled=!G.playerTurn||G.busy;
  document.getElementById('btn-defend').disabled=!G.playerTurn||G.busy;
}

function setPlayerTurn(){ G.playerTurn=true; G.busy=false;
  document.getElementById('turnLabel').textContent='YOUR TURN';
  document.getElementById('turnLabel').style.color='var(--cyan)'; updateHUD(); }

function setEnemyTurn(){ G.playerTurn=false;
  document.getElementById('turnLabel').textContent='ENEMY TURN';
  document.getElementById('turnLabel').style.color='var(--red)'; updateHUD();
  setTimeout(enemyAct,1200); }

// LOG
function setLog(m,c){ const l=document.getElementById('battleLog'); l.innerHTML=`<div class="log-line" style="color:${c||'#f0f4ff'}">${m}</div>`; }
function addLog(m,c){ const l=document.getElementById('battleLog');
  const d=document.createElement('div'); d.className='log-line'; d.style.color=c||'#f0f4ff'; d.textContent=m;
  l.appendChild(d); if(l.children.length>3) l.removeChild(l.firstChild); }

// FLOAT DMG
function floatDmg(el,dmg,color){
  const r=el.getBoundingClientRect();
  const d=document.createElement('div');
  d.className='float-dmg'; d.textContent='-'+dmg; d.style.color=color||'#ff4444';
  d.style.left=(r.left+r.width/2-15)+'px'; d.style.top=(r.top+20)+'px';
  document.body.appendChild(d); setTimeout(()=>d.remove(),1200);
}

// ══════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════
function doAction(type){
  if(!G.playerTurn||G.busy) return;
  G.busy=true; G.playerDef=false;
  const ch=G.playerChar;
  const pEl=document.getElementById('playerSprite');
  const eEl=document.getElementById('enemySprite');
  const pImg=document.getElementById('playerImg');

  if(type==='attack'){
    setPlayerSprite('attack');
    pEl.classList.add('shake');
    setTimeout(()=>{ pEl.classList.remove('shake'); setPlayerSprite('idle'); },450);
    const dmg=Math.max(1,ch.atk+Math.floor(Math.random()*8)-LEVELS[G.currentLevel].enemyDef);
    setTimeout(()=>{
      G.enemyHp-=dmg; eEl.classList.add('hit-flash','enemy-shake');
      setTimeout(()=>eEl.classList.remove('hit-flash','enemy-shake'),450);
      floatDmg(eEl,dmg,'#ff4444');
      addLog('⚔ '+ch.name+' attacks! -'+dmg+' HP','#ff9ed8');
      G.playerUlt=Math.min(100,G.playerUlt+15); updateHUD(); checkEnemyDead();
    },350);

  } else if(type==='skill'){
    if(G.playerMp<ch.skill.mp){G.busy=false;return;}
    G.playerMp-=ch.skill.mp;
    setPlayerSprite('attack');
    const dmg=ch.skill.dmg+Math.floor(Math.random()*10);
    setTimeout(()=>{
      setPlayerSprite('idle');
      G.enemyHp-=dmg; eEl.classList.add('hit-flash','enemy-shake');
      setTimeout(()=>eEl.classList.remove('hit-flash','enemy-shake'),450);
      floatDmg(eEl,dmg,'#ff6eb4');
      addLog('✨ '+ch.skill.name+'! '+ch.skill.desc+' -'+dmg,'#ff6eb4');
      G.playerUlt=Math.min(100,G.playerUlt+20); updateHUD(); checkEnemyDead();
    },400);

  } else if(type==='ultimate'){
    if(G.playerUlt<100){G.busy=false;return;}
    G.playerUlt=0;
    setPlayerSprite('ult');
    pEl.classList.add('ult-flash');
    document.getElementById('battleBg').classList.add('ult-flash');
    const dmg=ch.ultimate.dmg+Math.floor(Math.random()*20);
    setTimeout(()=>{
      pEl.classList.remove('ult-flash'); document.getElementById('battleBg').classList.remove('ult-flash');
      G.enemyHp-=dmg; eEl.classList.add('hit-flash','enemy-shake');
      setTimeout(()=>eEl.classList.remove('hit-flash','enemy-shake'),600);
      floatDmg(eEl,dmg,'#ffee00');
      addLog('💥 '+ch.ultimate.name+'! '+ch.ultimate.desc+' -'+dmg+'!!','#ffe234');
      setTimeout(()=>{ setPlayerSprite('idle'); updateHUD(); checkEnemyDead(); },350);
    },750);

  } else if(type==='defend'){
    G.playerDef=true;
    G.playerMp=Math.min(G.playerMaxMp,G.playerMp+15);
    G.playerUlt=Math.min(100,G.playerUlt+10);
    addLog('🛡 '+ch.name+' braces! MP +15','#88aaff');
    updateHUD(); setTimeout(()=>setEnemyTurn(),600); return;
  }
  setTimeout(()=>{ if(G.enemyHp>0) setEnemyTurn(); },950);
}

function checkEnemyDead(){
  if(G.enemyHp>0) return;
  G.enemyHp=0; updateHUD();
  clearEnemySprite();
  const lv=LEVELS[G.currentLevel];
  if(G.wave<lv.waves){
    G.wave++; addLog('🌟 Wave '+(G.wave-1)+' cleared! Wave '+G.wave+' incoming!','#ffe234');
    setTimeout(()=>{ initWave(); updateHUD(); setPlayerTurn(); },1200);
  } else {
    addLog('🎉 LEVEL '+(G.currentLevel+1)+' COMPLETE!','#ffe234');
    setTimeout(()=>showResult(true),1400);
  }
}

function enemyAct(){
  const lv=LEVELS[G.currentLevel];
  const eEl=document.getElementById('enemySprite');
  const pEl=document.getElementById('playerSprite');
  eEl.classList.add('enemy-shake');
  setTimeout(()=>eEl.classList.remove('enemy-shake'),450);
  const roll=Math.random();
  let dmg=lv.enemyAtk+Math.floor(Math.random()*8);
  let msg='👊 '+lv.enemyName+' attacks!';
  if(roll>.7&&G.wave>1){ dmg=Math.floor(dmg*1.5); msg='💢 '+lv.enemyName+' POWER STRIKE!'; }
  if(G.playerDef){ dmg=Math.max(1,Math.floor(dmg*.4)); msg+=' (BLOCKED!)'; }
  dmg=Math.max(1,dmg-G.playerChar.def+Math.floor(Math.random()*4));
  setTimeout(()=>{
    G.playerHp-=dmg; pEl.classList.add('shake');
    setTimeout(()=>{ pEl.classList.remove('shake'); setPlayerSprite('idle'); },450);
    floatDmg(pEl,dmg,'#ff6666');
    addLog(msg+' -'+dmg+' HP','#ff6666');
    G.playerUlt=Math.min(100,G.playerUlt+8); updateHUD();
    if(G.playerHp<=0){ G.playerHp=0; updateHUD(); addLog('💀 DEFEATED...','#ff3333'); setTimeout(()=>showResult(false),1500); }
    else setPlayerTurn();
  },350);
}

// ══════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════
function showResult(win){
  const ri=document.getElementById('resultImg');
  ri.src = win ? G.playerChar.imgs.ult : G.playerChar.imgs.idle;
  document.getElementById('resultTitle').className='result-title '+(win?'win':'lose');
  document.getElementById('resultTitle').textContent=win?'VICTORY! ★':'DEFEATED...';
  document.getElementById('resultSub').textContent=win?
    'Level '+(G.currentLevel+1)+' cleared!\nLovee youu Mynaa 💌':
    "Don't give up!\nTry again cantikk 💕";
  document.getElementById('nextBtn').textContent=win?(G.currentLevel<2?'NEXT LEVEL ▶':'YOU WIN! 🎉'):'RETRY ↩';
  G._lastWin=win; switchScreen('resultScreen');
}

function nextLevel(){
  if(!G._lastWin){ initBattle(); return; }
  if(G.currentLevel>=2){
    document.getElementById('resultTitle').textContent='★ ALL CLEAR ★';
    document.getElementById('resultSub').textContent='hey there cantikk,\ni hope ur having fun!\ni lovee youu 💌';
    document.getElementById('nextBtn').textContent='PLAY AGAIN ↩'; G._lastWin=false; return;
  }
  G.currentLevel++; initBattle();
}
function goSelect(){ showSelect(); }
function switchScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

initTitle();
</script>
</body>
</html>
